<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark navy background -->
  <rect width="32" height="32" rx="4" fill="#06101e"/>

  <!-- Three rising bars -->
  <line x1="4" y1="27" x2="28" y2="27" stroke="#c0cdd8" stroke-width="0.5" opacity="0.35"/>
  <rect x="5"  y="20" width="5" height="7"  rx="0.5" fill="#3d5a72"/>
  <rect x="13" y="15" width="5" height="12" rx="0.5" fill="#2a6fbd"/>
  <rect x="21" y="9"  width="5" height="18" rx="0.5" fill="#d4a843"/>

  <!-- Razor blade at -45° centred on (16,16) -->
  <g transform="rotate(-45, 16, 16)">
    <rect x="2" y="11" width="28" height="10" rx="1" fill="#0e1f30" stroke="#c0cdd8" stroke-width="0.7"/>
    <rect x="2" y="11" width="28" height="3"  rx="1" fill="#c0cdd8" opacity="0.18"/>
    <line x1="2" y1="21" x2="30" y2="21" stroke="#d4a843" stroke-width="1.5"/>
    <rect x="11" y="14" width="10" height="5" rx="0.5" fill="none" stroke="#c0cdd8" stroke-width="0.6" opacity="0.5"/>
  </g>
</svg>
